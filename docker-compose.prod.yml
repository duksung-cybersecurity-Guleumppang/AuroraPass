# AWS 운영 배포용 Docker Compose
# 사용법: 환경변수 설정 후 docker compose -f docker-compose.prod.yml up

services:
  backend:
    image: ${ECR_REGISTRY}/aurora-backend:${IMAGE_TAG}
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
      - DATABASE_URL=${DATABASE_URL}
      - REDIS_URL=${REDIS_URL}
      - AWS_DEFAULT_REGION=${AWS_REGION}
    read_only: true
    tmpfs:
      - /tmp:size=64m
    ulimits:
      nofile: 65536
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8000/healthz || exit 1" ]
      interval: 10s
      timeout: 3s
      retries: 10
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/aurora-backend
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: ecs

  frontend:
    image: ${ECR_REGISTRY}/aurora-frontend:${IMAGE_TAG}
    ports:
      - "3000:3000"
    read_only: true
    restart: unless-stopped
    logging:
      driver: awslogs
      options:
        awslogs-group: /ecs/aurora-frontend
        awslogs-region: ${AWS_REGION}
        awslogs-stream-prefix: ecs
